  :root {
    --nav-h: 64px;
    --bg: #FFFDF8;
    --shadow: 0 4px 16px rgba(0,0,0,0.10);
  }
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  :focus-visible {
    outline: 4px solid #005FCC;
    outline-offset: 3px; border-radius: 6px;
  }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Grundschrift', sans-serif;
    background: var(--bg); color: #1A1A1A; font-size: 18px;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: var(--nav-h);
    background: #F5EFE8;
    border-bottom: 3px solid #E8C8A0;
    display: flex; align-items: center; gap: 7px;
    padding: 0 10px; overflow-x: auto;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0; padding: 8px 15px;
    border: 2px solid #D0C8C0; border-radius: 13px;
    background: #FFFFFF;
    font-family: 'Grundschrift', sans-serif;
    font-size: 1.05rem; font-weight: 700; color: #1A1A1A;
    cursor: pointer; white-space: nowrap; min-height: 44px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.10);
    transition: background 0.15s, transform 0.1s;
  }
  .nav-btn:hover { background: #FFE5CC; transform: scale(1.04); }
  .nav-btn.active { background: #FFDAC1; border-color: #E8820A; }
  .nav-home { font-size: 1.3rem; }

  /* Fibel-Nav nur auf Startseite sichtbar */
  .fibel-nav { display: none; }
  #page-start.active ~ nav .fibel-nav,
  body.on-start .fibel-nav { display: flex; }

  /* ── PAGES ── */
  .page {
    display: none; position: fixed;
    top: var(--nav-h); left: 0; right: 0; bottom: 0;
    overflow: hidden; padding-bottom: 24px;
  }
  .page.active { display: flex; flex-direction: column; }

  /* ── START ── */
  #page-start .start-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 18px; padding: 18px; flex: 1;
  }
  .start-btn {
    border: 3px solid transparent; border-radius: 28px;
    cursor: pointer;
    font-family: 'Grundschrift', sans-serif;
    font-size: 1.9rem; font-weight: 800; color: #1A1A1A;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .start-btn:hover { transform: scale(1.03); }
  .start-btn:active { transform: scale(0.97); }
  .start-btn .icon { font-size: 2.8rem; }
  .start-btn.fibel1 { background: linear-gradient(135deg,#FFD6E0,#FFB3C1); }
  .start-btn.fibel2 { background: linear-gradient(135deg,#C3F0DB,#A8DFC8); }
  .start-btn.fibel3 { background: linear-gradient(135deg,#D4DAFF,#B8C0F5); }
  .start-btn.zahlen { background: linear-gradient(135deg,#FFE5C8,#FFDAC1); }

  /* ── LETTER GRID ── */
  .letter-page-inner {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; padding: 12px;
  }
  .page-title {
    font-family: 'Grundschrift', sans-serif;
    font-size: 1.5rem; font-weight: 800;
    text-align: center; margin-bottom: 10px; flex-shrink: 0;
  }
  .letter-grid {
    flex: 1; display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px; overflow-y: auto;
    align-content: start; padding-bottom: 8px;
  }
  .letter-btn {
    padding: 10px 6px 8px;
    border: 2.5px solid transparent; border-radius: 16px;
    cursor: pointer;
    font-family: 'Grundschrift', sans-serif;
    font-size: 1.3rem; font-weight: 700; color: #1A1A1A;
    box-shadow: var(--shadow);
    transition: transform 0.12s, border-color 0.12s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    min-height: 80px;
  }
  .letter-btn:hover, .letter-btn:focus-visible {
    transform: scale(1.05); border-color: #005FCC;
  }
  .letter-btn:active { transform: scale(0.94); }
  .letter-btn .btn-icon {
    width: 48px; height: 48px;
    object-fit: contain; border-radius: 8px; display: block;
  }
  .letter-btn .btn-icon-placeholder {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; border-radius: 8px;
  }
  .letter-btn .btn-label { line-height: 1.1; }

  /* ── CASE SELECTION ── */
  #page-case .case-inner {
    flex: 1; display: flex; flex-direction: column;
    padding: 16px; gap: 12px;
  }
  .case-title {
    font-size: 1.4rem; font-weight: 800; text-align: center;
  }
  .case-grid {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .case-btn {
    border: 3px solid transparent; border-radius: 24px;
    cursor: pointer;
    font-family: 'Grundschrift', sans-serif;
    font-size: 2.6rem; font-weight: 800; color: #1A1A1A;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    transition: transform 0.12s; min-height: 44px;
  }
  .case-btn:hover { transform: scale(1.04); }
  .case-btn:active { transform: scale(0.96); }
  .case-label { font-size: 0.95rem; font-weight: 700; }

  /* ── TRACE PAGE ── */
  #page-trace .trace-inner {
    flex: 1; display: flex; flex-direction: column;
    padding: 6px 10px; gap: 5px; overflow: hidden;
  }
  .trace-top {
    display: flex; align-items: center;
    justify-content: space-between;
    flex-shrink: 0; gap: 8px;
  }
  .anlaut-box {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
  }
  .anlaut-img {
    width: 72px; height: 72px;
    object-fit: contain; border-radius: 14px;
    background: white; padding: 4px;
    box-shadow: var(--shadow); border: 2px solid #E8E8E8;
  }
  .anlaut-word {
    font-size: 0.82rem; font-weight: 700; color: #555; margin-top: 2px;
  }
  .anlaut-placeholder {
    width: 72px; height: 72px; border-radius: 14px; background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; border: 2px solid #E8E8E8;
  }
  .progress-area {
    display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
  }
  .progress-label { font-size: 0.82rem; font-weight: 700; color: #555; }
  .progress-dots {
    display: flex; gap: 7px; align-items: center;
    flex-wrap: wrap; justify-content: center;
  }
  .dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: #DDD; border: 2.5px solid #BBB;
    transition: background 0.35s, transform 0.3s;
  }
  .dot.done { background: #2E9E65; border-color: #1e7a4a; transform: scale(1.2); }

  .canvas-wrap {
    flex: 1; border-radius: 20px; overflow: hidden;
    box-shadow: var(--shadow); min-height: 0;
    border: 3px solid #E0E0E0;
  }
  #traceCanvas {
    display: block; width: 100%; height: 100%;
    touch-action: none; cursor: crosshair;
  }

  .trace-bottom {
    display: flex; gap: 10px;
    justify-content: center; flex-shrink: 0; flex-wrap: wrap;
    padding-top: 4px;
  }
  .action-btn {
    padding: 11px 20px;
    border: 2.5px solid transparent; border-radius: 15px;
    font-family: 'Grundschrift', sans-serif;
    font-weight: 800; font-size: 1rem;
    cursor: pointer; box-shadow: var(--shadow);
    transition: transform 0.12s;
    min-height: 48px; min-width: 90px;
  }
  .action-btn:hover { transform: scale(1.04); }
  .action-btn:active { transform: scale(0.95); }
  .btn-check { background: #B5EAD7; color: #0d5c30; }
  .btn-clear  { background: #FFD6E0; color: #7a1030; }
  .btn-speak  { background: #C7CEEA; color: #1a2a6a; }
  .btn-home   { background: #FFDAC1; color: #7a3010; }

  /* ── FOOTER ── */
  .copyright-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.93);
    border-top: 1px solid #EEE;
    text-align: center; font-size: 0.68rem; color: #888;
    padding: 3px 8px; z-index: 500;
  }
  .copyright-footer a { color: #666; text-decoration: underline; }

  /* ── CONFETTI ── */
  #confettiCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9999; display: none;
  }

  /* ── RESPONSIVE ── */
  @media (min-width: 600px) {
    .letter-grid { grid-template-columns: repeat(4,1fr); }
  }
  @media (min-width: 900px) {
    .letter-grid { grid-template-columns: repeat(5,1fr); }
  }
  @media (forced-colors: active) {
    .letter-btn,.case-btn,.start-btn,.action-btn,.nav-btn { border: 2px solid ButtonText; }
  }
</style>
</head>

<!-- NAV: Homebutton immer, Fibel-Buttons nur auf Startseite (per JS gesteuert) -->
<nav role="navigation" aria-label="Navigation" id="mainNav">

</nav>

<canvas id="confettiCanvas" aria-hidden="true"></canvas>

      <span class="icon" aria-hidden="true">🐛</span>Fibel 1
    </button>
    <button class="start-btn fibel2" onclick="showPage('fibel2')" aria-label="Fibel 2">
      <span class="icon" aria-hidden="true">🦋</span>Fibel 2

      <span class="icon" aria-hidden="true">⭐</span>Fibel 3
    </button>
    <button class="start-btn zahlen" onclick="showPage('zahlen')" aria-label="Zahlen">
      <span class="icon" aria-hidden="true">🔢</span>Zahlen
    </button>
  </div>
</div>

<!-- ══ FIBEL PAGES ══ -->
<div id="page-fibel1" class="page" role="main">

    <div class="letter-grid" id="grid-fibel1" role="list"></div>
  </div>
</div>
<div id="page-fibel2" class="page" role="main">
  <div class="letter-page-inner">
    <div class="page-title">🦋 Fibel 2</div>
    <div class="letter-grid" id="grid-fibel2" role="list"></div>
  </div>
</div>
<div id="page-fibel3" class="page" role="main">
  <div class="letter-page-inner">
    <div class="page-title">⭐ Fibel 3</div>
    <div class="letter-grid" id="grid-fibel3" role="list"></div>
  </div>
</div>
<div id="page-zahlen" class="page" role="main">
  <div class="letter-page-inner">
    <div class="page-title">🔢 Zahlen</div>
    <div class="letter-grid" id="grid-zahlen" role="list"></div>
  </div>
</div>

<!-- ══ CASE SELECT ══ -->
<div id="page-case" class="page" role="main">
  <div class="case-inner">

</div>

<div id="page-trace" class="page" role="main">
  <div class="trace-inner">
    <div class="trace-top">
      <div class="anlaut-box" id="anlautBox" aria-hidden="true"></div>
      <div class="progress-area">
        <div class="progress-label" id="progressLabel" aria-live="polite"></div>
        <div class="progress-dots" id="progressDots" role="status"></div>
      </div>
      <button class="action-btn btn-speak" onclick="speakLetter()" aria-label="Laut sprechen">🔊</button>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="traceCanvas" role="img" aria-label="Nachspurfeld" tabindex="0"></canvas>
    </div>
    <div class="trace-bottom">
      <button class="action-btn btn-home" onclick="showPage('start')">🏠 Start</button>
      <button class="action-btn btn-clear" onclick="clearCanvas()">🗑 Neu</button>
      <button class="action-btn btn-check" onclick="checkTracing()">✅ Prüfen</button>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════════
// BUILD GRIDS
// ═══════════════════════════════════════════════
function buildGrid(containerId, items, fibel, colorOff) {
  const grid = document.getElementById(containerId);
  items.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.style.background = BTN_COLORS[(i+colorOff) % BTN_COLORS.length];
    btn.setAttribute('role','listitem');
    const label = item.key;
    const word  = item.word || '';
    const icon  = item.icon || null;
    if (icon) {
      const img = document.createElement('img');
      img.src = icon; img.alt = word; img.className = 'btn-icon';
      img.onerror = function() {
        this.style.display = 'none';
        const ph = document.createElement('span');
        ph.className = 'btn-icon-placeholder';
        ph.textContent = label[0];
        btn.insertBefore(ph, btn.firstChild);
      };
      btn.appendChild(img);
    } else {
      const ph = document.createElement('span');
      ph.className = 'btn-icon-placeholder';
      ph.textContent = '🔢';
      btn.appendChild(ph);
    }
    const span = document.createElement('span');
    span.className = 'btn-label';
    span.textContent = label;
    btn.appendChild(span);
    btn.setAttribute('aria-label', word ? `${label} wie ${word}` : `Zahl ${label}`);
    btn.onclick = () => {
      if (item.noCase) startTrace(item.single || item.key, item.word||'', fibel, item.icon);
      else showCaseSelection(item, fibel);
    };
    grid.appendChild(btn);
  });
}
buildGrid('grid-fibel1', FIBEL1, 'fibel1', 0);
buildGrid('grid-fibel2', FIBEL2, 'fibel2', 3);
buildGrid('grid-fibel3', FIBEL3, 'fibel3', 6);
buildGrid('grid-zahlen', ZAHLEN, 'zahlen', 1);

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');

  // Fibel-Nav nur auf Startseite anzeigen
  const fibelNav = document.getElementById('fibelNav');
  if (id === 'start') {
    fibelNav.style.display = 'contents';
  } else {
    fibelNav.style.display = 'none';
  }

  // Aktiv-Markierung in Nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const labels = {start:'🏠', fibel1:'Fibel 1', fibel2:'Fibel 2', fibel3:'Fibel 3', zahlen:'Zahlen'};
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.textContent.trim() === (labels[id]||'')) b.classList.add('active');
  });
}

// ═══════════════════════════════════════════════
// CASE SELECTION
// ═══════════════════════════════════════════════
function showCaseSelection(item, fibel) {
  currentFibel = fibel;
  document.getElementById('caseTitle').textContent = `${item.key} – Groß oder klein?`;
  const grid = document.getElementById('caseGrid');
  grid.innerHTML = '';
  [
    {label:'Großbuchstabe', char:item.upper, bg:'#FFD6E0'},
    {label:'Kleinbuchstabe', char:item.lower, bg:'#B5EAD7'},
  ].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'case-btn'; btn.style.background = c.bg;
    btn.setAttribute('aria-label', `${c.label} ${c.char}`);
    if (item.icon) {
      const img = document.createElement('img');
      img.src = item.icon; img.alt = item.word || item.key;
      img.style.cssText = 'width:56px;height:56px;object-fit:contain;border-radius:10px;';
      img.onerror = () => img.remove();
      btn.appendChild(img);
    }
    const cs = document.createElement('span'); cs.textContent = c.char;
    const ls = document.createElement('span'); ls.className = 'case-label'; ls.textContent = c.label;
    btn.appendChild(cs); btn.appendChild(ls);
    btn.onclick = () => startTrace(c.char, item.word||c.char, fibel, item.icon);
    grid.appendChild(btn);
  });
  showPage('case');
}

// ═══════════════════════════════════════════════
// TRACE SETUP
// ═══════════════════════════════════════════════
function startTrace(char, word, fibel, iconPath) {
  currentChar = char; currentWord = word || char;
  currentFibel = fibel;
  successCount = 0; colorIdx = 0;
  hasDrawn = false; totalDrawnPixels = 0;

  // Anlautbild
  const box = document.getElementById('anlautBox');
  if (iconPath) {
    box.innerHTML = `<img class="anlaut-img" src="${iconPath}" alt="${word}"
      onerror="this.parentElement.innerHTML='<div class=anlaut-placeholder>📖</div><div class=anlaut-word>${word}</div>'">
      <div class="anlaut-word">${word}</div>`;
  } else {
    box.innerHTML = `<div class="anlaut-placeholder">🔢</div><div class="anlaut-word">${word}</div>`;
  }

  updateProgressDots();
  showPage('trace');
  requestAnimationFrame(() => initCanvas());
}

function updateProgressDots() {
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  document.getElementById('progressLabel').textContent = `${successCount} von ${GOAL} geschafft`;
  for (let i = 0; i < GOAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < successCount ? ' done' : '');
    d.id = `dot${i}`;
    dots.appendChild(d);
  }
}

// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
function initCanvas() {
  const canvas = document.getElementById('traceCanvas');
  const wrap   = document.getElementById('canvasWrap');
  CW = wrap.offsetWidth;
  CH = wrap.offsetHeight;
  canvas.width  = CW;
  canvas.height = CH;
  ctx = canvas.getContext('2d');
  maskCanvas = document.createElement('canvas');
  maskCanvas.width  = CW;
  maskCanvas.height = CH;
  maskCtx = maskCanvas.getContext('2d');
  drawLetterFrame();
}

function computeFontSize() {
  const len  = currentChar.length;
  const base = Math.min(CW, CH) * 0.85;
  if (len === 1) return base;
  const isLower = currentChar === currentChar.toLowerCase();
  if (len === 2) return isLower ? base * 0.75 : base * 0.62;
  return isLower ? base * 0.54 : base * 0.42;
}

function drawLetterFrame() {
  const theme = THEMES[colorIdx % THEMES.length];
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, CW, CH);
  const fontSize = computeFontSize();
  const cx = CW / 2, cy = CH / 2;
  const strokeW = Math.max(fontSize * 0.11, 12);
  buildMask(fontSize, cx, cy, strokeW);
  ctx.save();
  ctx.font = `${fontSize}px "GrundschriftKontur", sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.setLineDash([]); ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  // Halo
  ctx.lineWidth   = strokeW * 1.8;
  ctx.strokeStyle = theme.stroke + '28';
  ctx.strokeText(currentChar, cx, cy);
  // Scharfe Linie
  ctx.lineWidth   = Math.max(fontSize * 0.028, 3.5);
  ctx.strokeStyle = theme.stroke + 'EE';
  ctx.strokeText(currentChar, cx, cy);
  ctx.restore();
}

function buildMask(fontSize, cx, cy, strokeW) {
  maskCtx.fillStyle = '#000';
  maskCtx.fillRect(0, 0, CW, CH);
  maskCtx.font = `${fontSize}px "GrundschriftKontur", sans-serif`;
  maskCtx.textAlign = 'center'; maskCtx.textBaseline = 'middle';
  maskCtx.fillStyle = '#FFF';
  maskCtx.fillText(currentChar, cx, cy);
  maskCtx.lineWidth   = strokeW * 1.4;
  maskCtx.strokeStyle = '#FFF';
  maskCtx.lineJoin = 'round'; maskCtx.lineCap = 'round';
  maskCtx.setLineDash([]);
  maskCtx.strokeText(currentChar, cx, cy);
}

// ═══════════════════════════════════════════════
// ZEICHNEN
// ═══════════════════════════════════════════════
const traceCanvas = document.getElementById('traceCanvas');

function getPos(e) {
  const rect = traceCanvas.getBoundingClientRect();
  const sx = traceCanvas.width / rect.width;
  const sy = traceCanvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
}

traceCanvas.addEventListener('mousedown',  e => { isDrawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; hasDrawn=true; });
traceCanvas.addEventListener('mousemove',  e => { if (isDrawing) paintStroke(e); });
traceCanvas.addEventListener('mouseup',    () => isDrawing = false);
traceCanvas.addEventListener('mouseleave', () => isDrawing = false);
traceCanvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; hasDrawn=true; }, {passive:false});
traceCanvas.addEventListener('touchmove',  e => { e.preventDefault(); if (isDrawing) paintStroke(e); }, {passive:false});
traceCanvas.addEventListener('touchend',   e => { e.preventDefault(); isDrawing=false; }, {passive:false});

function paintStroke(e) {
  if (!ctx) return;
  const p = getPos(e);
  const dx = p.x - lastX, dy = p.y - lastY;
  totalDrawnPixels += Math.sqrt(dx*dx + dy*dy);
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y);
  ctx.strokeStyle = '#000000DD';
  ctx.lineWidth   = Math.max(CW * 0.018, 5);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.setLineDash([]);
  ctx.stroke();
  lastX = p.x; lastY = p.y;
}

// ═══════════════════════════════════════════════
// PRÜFEN
// ═══════════════════════════════════════════════
function checkTracing() {
  if (!hasDrawn) return;

  const fontSize = computeFontSize();
  if (totalDrawnPixels < fontSize * 0.15) return;

  const drawData = ctx.getImageData(0,0,CW,CH).data;
  const maskData = maskCtx.getImageData(0,0,CW,CH).data;
  const [bgR,bgG,bgB] = hexToRgb(THEMES[colorIdx % THEMES.length].bg);

  let drawn=0, inside=0, outside=0;
  for (let i=0; i<drawData.length; i+=4) {
    const dR=Math.abs(drawData[i]-bgR),
          dG=Math.abs(drawData[i+1]-bgG),
          dB=Math.abs(drawData[i+2]-bgB);
    if (dR+dG+dB <= 90) continue;
    drawn++;
    if (maskData[i] > 128) inside++; else outside++;
  }

  if (drawn < CW*CH*0.008) return;

  const accuracy = inside / drawn;
  if (accuracy >= 0.70 && (outside/drawn) < 0.30) {
    onSuccess();
  }
  // kein Feedback bei Misserfolg — einfach weiter versuchen
}

function onSuccess() {
  successCount++;
  const dot = document.getElementById(`dot${successCount-1}`);
  if (dot) dot.classList.add('done');
  document.getElementById('progressLabel').textContent = `${successCount} von ${GOAL} geschafft`;
  hasDrawn = false; totalDrawnPixels = 0;

  if (successCount >= GOAL) {
    launchConfetti();
    playApplause();
    setTimeout(() => {
      successCount = 0; colorIdx = 0;
      updateProgressDots(); clearCanvas();
    }, 5000);
  } else {
    colorIdx++;
    setTimeout(() => clearCanvas(), 700);
  }
}

function clearCanvas() {
  if (!ctx) return;
  drawLetterFrame();
  hasDrawn = false; totalDrawnPixels = 0;
}

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? [parseInt(r[1],16),parseInt(r[2],16),parseInt(r[3],16)] : [255,255,255];
}

// ═══════════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════════
function speakText(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.75; u.pitch=1.1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
function speakLetter() {
  const phonetic = PHONETICS_MAP[currentChar] || currentChar;
  const u = new SpeechSynthesisUtterance(phonetic);
  u.lang='de-DE'; u.rate=0.6; u.pitch=1.0;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════
// APPLAUS
// ═══════════════════════════════════════════════
function playApplause() {
  try {
    const a = new Audio(APPLAUSE_SRC);
    a.volume = 0.9;
    a.play().catch(() => {});
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// KONFETTI
// ═══════════════════════════════════════════════
function launchConfetti() {
  const cv = document.getElementById('confettiCanvas');
  cv.style.display = 'block';
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const cc  = cv.getContext('2d');
  const cols = ['#FFB3C1','#B5EAD7','#C7CEEA','#FFDAC1','#E2F0CB','#F2C4DE',
                '#FFE66D','#A8EDEA','#FFC0CB','#FFD700','#98FB98','#87CEEB'];
  const pieces = Array.from({length:220}, () => {
    const s = 6 + Math.random()*14;
    return {
      x: Math.random()*cv.width, y: -60-Math.random()*cv.height*0.6,
      w: s, h: s*(0.4+Math.random()*0.8),
      color: cols[Math.floor(Math.random()*cols.length)],
      rot: Math.random()*360, vx: (Math.random()-0.5)*6,
      vy: 2+Math.random()*5,  vr: (Math.random()-0.5)*12,
      shape: Math.random()<0.33 ? 'circle' : Math.random()<0.5 ? 'rect' : 'star'
    };
  });
  let f = 0;
  function frame() {
    cc.clearRect(0, 0, cv.width, cv.height);
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.04; p.rot+=p.vr;
      if (p.y > cv.height+20) { p.y=-20; p.x=Math.random()*cv.width; }
      cc.save(); cc.translate(p.x, p.y); cc.rotate(p.rot*Math.PI/180);
      cc.fillStyle = p.color;
      if (p.shape==='circle') {
        cc.beginPath(); cc.arc(0,0,p.w/2,0,Math.PI*2); cc.fill();
      } else if (p.shape==='rect') {
        cc.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      } else {
        cc.beginPath();
        for (let s=0;s<5;s++) {
          const a=s*Math.PI*2/5-Math.PI/2, b=a+Math.PI/5, r1=p.w/2, r2=p.w/5;
          if (s===0) cc.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);
          else cc.lineTo(Math.cos(a)*r1,Math.sin(a)*r1);
          cc.lineTo(Math.cos(b)*r2,Math.sin(b)*r2);
        }
        cc.closePath(); cc.fill();
      }
      cc.restore();
    });
    if (++f < 300) requestAnimationFrame(frame);
    else { cc.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
  }
  requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (document.getElementById('page-trace').classList.contains('active')) initCanvas();
  }, 150);
});

  navigator.serviceWorker.register('./service-worker.js', {scope:'./'}).catch(()=>{});
}

showPage('start');
</script>
